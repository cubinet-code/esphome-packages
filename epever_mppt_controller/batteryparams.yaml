select:

  - platform: modbus_controller
    modbus_controller_id: epever
    id: battery_type
    name: "${prefix} BP: Battery Type"
    address: 0x9000
    value_type: U_WORD
    optionsmap:
      "User Defined": 0
      "Sealed": 1
      "Gel": 2
      "Flooded": 3
    icon: mdi:battery-unknown


  - platform: modbus_controller
    modbus_controller_id: epever
    name: "${prefix} BP: Charging Mode"
    address: 0x9070
    value_type: U_WORD
    optionsmap:
      "Voltage Compensation": 0
      "SOC": 1
    icon: mdi:battery-unknown

number:

#
