select:

  - platform: modbus_controller
    modbus_controller_id: epever
    id: load_controlling_modes_select
    name: "${prefix} LC: Load Control Mode"
    address: 0x903d
    value_type: U_WORD
    optionsmap:
      "Manual Control": 0
      "Time Control 9042/9045 9069: 9048/904b": 1
      "Light(Time after Sunset, before Sunrise) 903e/903f/9065": 2
      "Light(Voltage/Delay) 901e/f 9020/1": 3
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: epever
    address: 0x9069
    name: "${prefix} LC: Time Control Mode"
    optionsmap:
      "Only Timer 1": 0
      "Timer 1 & Timer 2": 1
    value_type: U_WORD
    icon: mdi:timer

  - platform: modbus_controller
    modbus_controller_id: epever
    address: 0x906a
    name: "${prefix} LC: Manual Mode Default"
    optionsmap:
      "Off": 0
      "On": 1
    value_type: U_WORD
    # icon: mdi:timer

number:
  - platform: modbus_controller
    modbus_controller_id: epever
    id: x901e
    address: 0x901e
    name: "${prefix} LC: Night Time Threshold Voltage"
    unit_of_measurement: "V"
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 99
    step: 0.1
    icon: mdi:weather-sunset-down
    force_new_range: true
    use_write_multiple: true
    multiply: 100
    write_lambda: |-
      id(update_nttv).execute();
      return{};

  - platform: modbus_controller
    modbus_controller_id: epever
    id: x9020
    address: 0x9020
    name: "${prefix} LC: Day Time Threshold Voltage"
    unit_of_measurement: "V"
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 99
    step: 0.1
    icon: mdi:weather-sunset-up
    force_new_range: true
    use_write_multiple: true
    multiply: 100
      id(update_nttv).execute();
      return{};
      
script:
  - id: update_nttv
    then:
      - lambda: |-
          esphome::modbus_controller::ModbusController *controller = id(epever);

          std::vector<uint16_t> values = {
            (uint16_t)(id(x901e).state * 100),  // NTTV
            (uint16_t)(id(x901f).state),        // Delay 
            (uint16_t)(id(x9020).state * 100),  // DTTV
            (uint16_t)(id(x9021).state)         // Delay
          };
              
          esphome::modbus_controller::ModbusCommandItem cmd =
              esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(
                controller, 0x901e, values.size(), values
              );
          delay(200);
          controller->queue_command(cmd);
          
          delay(200);
          for(std::vector<uint16_t>::size_type i = 0; i != values.size(); i++) {
            ESP_LOGI("epever_mppt_controller", "NTTV %x: %d", i + 0x9000, values[i]);
          }
