substitutions:
  name: tracer
  prefix: "MPPT"
  update_interval: 30s
  disabled_by_default: "true"
  DI: GPIO19    # TX Pin
  RO: GPIO18    # RX Pin
  REDE: GPIO23  # RE/DE Pin
  # pkg_src: "!include "
  pkg_src: "github://cubinet-code/esphome-packages/"
  timezone: "Europe/Berlin"
  
esphome:
  name: ${name}
  project:
    name: "cubinet-code.epever_mppt_controller"
    version: "1.0.0"

esp32:
  board: esp32dev
  framework:
    type: arduino
    version: latest

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

dashboard_import:
  package_import_url: github://cubinet-code/esphome-packages/epever_mppt_controller.yaml

# https://github.com/cubinet-code/esphome-packages
packages:
  specs:              "github://cubinet-code/esphome-packages/epever_mppt_controller/specs.yaml"
  operations:         "github://cubinet-code/esphome-packages/epever_mppt_controller/operations.yaml"
  realtime:           "github://cubinet-code/esphome-packages/epever_mppt_controller/realtime.yaml"
  stats:              "github://cubinet-code/esphome-packages/epever_mppt_controller/stats.yaml"
  stats-charging:     "github://cubinet-code/esphome-packages/epever_mppt_controller/stats-charging.yaml"
  stats-discharging:  "github://cubinet-code/esphome-packages/epever_mppt_controller/stats-discharging.yaml"
  stats-battery:      "github://cubinet-code/esphome-packages/epever_mppt_controller/stats-battery.yaml"
  settings:           "github://cubinet-code/esphome-packages/epever_mppt_controller/settings.yaml"
  loadcontrol:        "github://cubinet-code/esphome-packages/epever_mppt_controller/loadcontrol.yaml"
  batteryparams:      "github://cubinet-code/esphome-packages/epever_mppt_controller/batteryparams.yaml"

web_server:
  port: 80

time:
  - platform: homeassistant
    id: hass_time
    update_interval: never
  - platform: sntp
    id: sntp_time
    update_interval: never
    timezone: $timezone
    on_time_sync:
        then:
          - script.execute: update_rtc

logger:
  #level: VERBOSE

api:
  reboot_timeout: 0s

ota:
  on_error:
    - button.press: restart_button

uart:
  tx_pin: ${DI} # DI
  rx_pin: ${RO} # RO
  baud_rate: 115200
  stop_bits: 1

modbus:
  flow_control_pin: ${REDE} # RE/DE
  send_wait_time: 200ms

modbus_controller:
  - id: epever
    address: 0x1
    # command_throttle: 10ms
    update_interval: ${update_interval}

sensor:
  - platform: wifi_signal
    name: "${prefix} ESP WiFi Signal"
    update_interval: ${update_interval}
    entity_category: diagnostic

button:
  - platform: restart
    id: restart_button
    name: "${prefix} ESP Restart"
    entity_category: diagnostic


