select:

  - platform: modbus_controller
    modbus_controller_id: epever
    id: load_controlling_modes_select
    name: "${prefix} LC: Load Control Mode"
    address: 0x903D
    value_type: U_WORD
    optionsmap:
      "Manual Control": 0
      "Time Control 9042/9045 9069: 9048/904b": 1
      "Light(Time after Sunset, before Sunrise) 903e/903f/9065": 2
      "Light(Voltage/Delay) 901e/f 9020/1": 3
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: epever
    address: 0x9069
    name: "${prefix} LC: Time Control Mode"
    optionsmap:
      "Only Timer 1": 0
      "Timer 1 & Timer 2": 1
    value_type: U_WORD
    icon: mdi:timer

  - platform: modbus_controller
    modbus_controller_id: epever
    address: 0x906a
    name: "${prefix} LC: Manual Mode Default"
    optionsmap:
      "Off": 0
      "On": 1
    value_type: U_WORD
    # icon: mdi:timer

number:
  - platform: modbus_controller
    modbus_controller_id: epever
    id: nttv
    address: 0x901e
    name: "${prefix} LC: Night Time Threshold Voltage"
    unit_of_measurement: "V"
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 99
    step: 0.1
    icon: mdi:weather-sunset-down
    use_write_multiple: true
    write_lambda: |-
      uint16_t value = x;
      payload.push_back(value);
      return x * 1.0;
    multiply: 100

  - platform: modbus_controller
    modbus_controller_id: epever
    id: dttv
    address: 0x9020
    name: "${prefix} LC: Day Time Threshold Voltage"
    unit_of_measurement: "V"
    register_type: holding
    value_type: U_WORD
    min_value: 0
    max_value: 99
    step: 0.1
    icon: mdi:weather-sunset-up
    use_write_multiple: true
    write_lambda: |-
      uint16_t value = x;
      return x * 1.0;
    multiply: 100
